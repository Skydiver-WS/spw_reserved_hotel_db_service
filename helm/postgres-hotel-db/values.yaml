# Default values for auth-db-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: docker.io/postgres
  #  Значение	Что делает pullPolicy
  #  Always	всегда тянет образ
  #  IfNotPresent	только если нет локально
  #  Never	не тянет вообще
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 16

service:
  type: ClusterIP
  port: 5432
  targetPort: 5433

secret:
  name: postgres-hotel-db-secret # ✅ переименовано для ясности
  username: postgres
  password: postgres
  db: hotel_db

persistence:
  enabled: true
  size: 5Gi


